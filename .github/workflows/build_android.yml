name: Build Android AAR

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout libXray
      uses: actions/checkout@v4
      with:
        repository: XTLS/libXray
        path: libXray
        
    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'
        
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        packages: 'platforms;android-35'
        
    - name: Install NDK with specific API level
      run: |
        # ตั้งค่า NDK version ที่รองรับ API 21+
        echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
        echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/25.2.9519653" >> $GITHUB_ENV
        
        # ดาวน์โหลด NDK version ที่ต้องการ
        $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "ndk;25.2.9519653"
        
    - name: Install gomobile
      run: |
        go install golang.org/x/mobile/cmd/gomobile@latest
        gomobile init
        
    - name: Build AAR
      working-directory: ./libXray
      run: |
        # กำหนด API level ให้ชัดเจน
        export ANDROID_HOME=$ANDROID_HOME
        export ANDROID_NDK_HOME=$ANDROID_HOME/ndk/25.2.9519653
        
        # Build ด้วย API 21+
        gomobile bind -target=android -androidapi=21 -o libXray.aar ./...
        
    - name: Upload AAR
      uses: actions/upload-artifact@v4
      with:
        name: libXray-android
        path: ./libXray/libXray.aar
