name: Build Android AAR

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # ให้กดรันเองได้

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout libXray
      uses: actions/checkout@v4
      with:
        repository: XTLS/libXray
        path: libXray
        
    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'
        
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        
    - name: Setup Android SDK
      run: |
        sudo apt-get update
        sudo apt-get install -y android-sdk
        echo "ANDROID_HOME=/usr/lib/android-sdk" >> $GITHUB_ENV
        
    - name: Install gomobile
      run: |
        go install golang.org/x/mobile/cmd/gomobile@latest
        gomobile init
        
    - name: Build AAR
      working-directory: ./libXray
      run: |
        gomobile bind -target=android -o libXray.aar ./...
        
    - name: Upload AAR
      uses: actions/upload-artifact@v4
      with:
        name: libXray-android
        path: ./libXray/libXray.aar
