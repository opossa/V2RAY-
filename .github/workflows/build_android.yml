name: Build Android

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: [1.21]
        arch: [amd64, arm64]

    steps:
    - uses: actions/checkout@v3

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: ${{ matrix.go-version }}

    - name: Install gomobile
      run: |
        # ตั้ง GOPATH และ PATH
        export GOPATH=$HOME/go
        export GOBIN=$GOPATH/bin
        export PATH=$PATH:$GOBIN

        # ติดตั้ง gomobile รุ่นที่รองรับ Go 1.21
        go install golang.org/x/mobile/cmd/gomobile@v0.0.0-20230818142203-6c1d6c3a0a4b

        # Init gomobile
        gomobile init -v

    - name: Build Android
      working-directory: libXray
      run: |
        python3 build/main.py android
